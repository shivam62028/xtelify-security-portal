<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <rect width="100" height="120" rx="8" fill="#E40000"/>

  <!-- Airtel swoosh/wave -->
  <path d="M25 55 Q25 30, 50 30 Q75 30, 75 55"
        stroke="white"
        stroke-width="10"
        stroke-linecap="round"
        fill="none"/>

  <!-- Dot -->
  <circle cx="75" cy="35" r="6" fill="white"/>

  <!-- airtel text -->
  <text x="50" y="100"
        font-family="Arial, sans-serif"
        font-size="18"
        font-weight="normal"
        fill="white"
        text-anchor="middle">airtel</text>
</svg>
